<!DOCTYPE html>
<html>

<head>
    <title>User Registration - Task 2</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>User Registration</h1>
        <p class="subtitle">Please fill in all the details carefully</p>

        <!-- Form sends data to /submit using POST -->
        <form action="/submit" method="POST" onsubmit="return validateForm()">

            <!-- Name Field -->
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">
                <span class="error-msg" id="nameError"></span>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label>Email Address:</label>
                <input type="text" id="email" name="email" placeholder="Enter your email">
                <span class="error-msg" id="emailError"></span>
            </div>

            <!-- Age Field -->
            <div class="form-group">
                <label>Age:</label>
                <input type="number" id="age" name="age" placeholder="Enter your age">
                <span class="error-msg" id="ageError"></span>
            </div>

            <!-- Phone Field -->
            <div class="form-group">
                <label>Phone Number:</label>
                <input type="text" id="phone" name="phone" placeholder="Enter 10 digit phone number">
                <span class="error-msg" id="phoneError"></span>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" name="password" placeholder="Minimum 6 characters">
                <span class="error-msg" id="passwordError"></span>

                <!-- Password strength bar -->
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <span class="strength-text" id="strengthText"></span>
            </div>

            <!-- Submit Button -->
            <button type="submit">Register</button>

        </form>

    </div>


    <!-- CLIENT-SIDE VALIDATION using inline JavaScript -->
    <script>

        // Check password strength when user types
        document.getElementById('password').addEventListener('input', function() {
            var password = this.value;
            var fill = document.getElementById('strengthFill');
            var text = document.getElementById('strengthText');

            if (password.length == 0) {
                fill.style.width = '0%';
                fill.style.backgroundColor = '#ccc';
                text.textContent = '';
            } else if (password.length < 4) {
                fill.style.width = '30%';
                fill.style.backgroundColor = '#e74c3c';
                text.textContent = 'Weak';
                text.style.color = '#e74c3c';
            } else if (password.length < 6) {
                fill.style.width = '60%';
                fill.style.backgroundColor = '#f39c12';
                text.textContent = 'Medium';
                text.style.color = '#f39c12';
            } else {
                fill.style.width = '100%';
                fill.style.backgroundColor = '#2ecc71';
                text.textContent = 'Strong';
                text.style.color = '#2ecc71';
            }
        });


        // This function runs when user clicks Register button
        function validateForm() {

            // Clear previous errors first
            document.getElementById('nameError').textContent = '';
            document.getElementById('emailError').textContent = '';
            document.getElementById('ageError').textContent = '';
            document.getElementById('phoneError').textContent = '';
            document.getElementById('passwordError').textContent = '';

            // Get all values
            var name = document.getElementById('name').value.trim();
            var email = document.getElementById('email').value.trim();
            var age = document.getElementById('age').value.trim();
            var phone = document.getElementById('phone').value.trim();
            var password = document.getElementById('password').value;

            // Track if form is valid
            var isValid = true;

            // Validate name
            if (name == '') {
                document.getElementById('nameError').textContent = 'Name is required';
                isValid = false;
            } else if (name.length < 3) {
                document.getElementById('nameError').textContent = 'Name must be at least 3 characters';
                isValid = false;
            }

            // Validate email
            if (email == '') {
                document.getElementById('emailError').textContent = 'Email is required';
                isValid = false;
            } else if (!email.includes('@') || !email.includes('.')) {
                document.getElementById('emailError').textContent = 'Enter a valid email address';
                isValid = false;
            }

            // Validate age
            if (age == '') {
                document.getElementById('ageError').textContent = 'Age is required';
                isValid = false;
            } else if (isNaN(age) || parseInt(age) < 1 || parseInt(age) > 100) {
                document.getElementById('ageError').textContent = 'Age must be between 1 and 100';
                isValid = false;
            }

            // Validate phone
            if (phone == '') {
                document.getElementById('phoneError').textContent = 'Phone number is required';
                isValid = false;
            } else if (phone.length != 10 || isNaN(phone)) {
                document.getElementById('phoneError').textContent = 'Phone must be exactly 10 digits';
                isValid = false;
            }

            // Validate password
            if (password == '') {
                document.getElementById('passwordError').textContent = 'Password is required';
                isValid = false;
            } else if (password.length < 6) {
                document.getElementById('passwordError').textContent = 'Password must be at least 6 characters';
                isValid = false;
            }

            // If isValid is true, form submits. If false, it stops.
            return isValid;
        }

    </script>

</body>

</html>
