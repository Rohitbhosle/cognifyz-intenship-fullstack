<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 5 - Product Manager API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <span class="navbar-brand">🛒 ProductAPI</span>
            <span class="nav-badge" id="totalBadge">Loading...</span>
        </div>
    </nav>

    <div class="app-layout">

        <!-- SIDEBAR: ADD / EDIT FORM -->
        <aside class="sidebar">
            <div class="sidebar-inner">

                <h3 class="sidebar-title" id="formTitle">Add New Product</h3>

                <input type="hidden" id="editingId" value="">

                <div class="field-group">
                    <label>Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. Wireless Mouse">
                    <span class="ferr" id="pNameErr"></span>
                </div>

                <div class="field-group">
                    <label>Category</label>
                    <select id="pCategory">
                        <option value="">-- Select Category --</option>
                        <option value="Electronics">Electronics</option>
                        <option value="Stationery">Stationery</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Clothing">Clothing</option>
                        <option value="Food">Food</option>
                        <option value="Other">Other</option>
                    </select>
                    <span class="ferr" id="pCategoryErr"></span>
                </div>

                <div class="field-group">
                    <label>Price (₹)</label>
                    <input type="number" id="pPrice" placeholder="e.g. 999" min="1">
                    <span class="ferr" id="pPriceErr"></span>
                </div>

                <div class="field-group">
                    <label>Stock Quantity</label>
                    <input type="number" id="pStock" placeholder="e.g. 50" min="0">
                    <span class="ferr" id="pStockErr"></span>
                </div>

                <button class="btn-add" id="submitBtn">➕ Add Product</button>
                <button class="btn-cancel" id="cancelBtn" style="display:none;">✕ Cancel Edit</button>

                <div id="formMsg" class="form-msg" style="display:none;"></div>

            </div>
        </aside>

        <!-- MAIN: PRODUCT LIST -->
        <main class="main-content">

            <div class="topbar">
                <h2 class="content-title">All Products</h2>
                <div class="search-wrap">
                    <input type="text" id="searchInput" placeholder="Search by name or category...">
                    <span class="search-icon">🔍</span>
                </div>
            </div>

            <!-- Shows the actual API routes being used -->
            <div class="api-strip">
                <span class="api-tag get">GET</span> /api/task5/products &nbsp;|&nbsp;
                <span class="api-tag post">POST</span> /api/task5/products &nbsp;|&nbsp;
                <span class="api-tag put">PUT</span> /api/task5/products/:id &nbsp;|&nbsp;
                <span class="api-tag delete">DELETE</span> /api/task5/products/:id
            </div>

            <div id="productsGrid" class="products-grid">
                <p class="loading-msg">Loading products from API...</p>
            </div>

            <div id="searchInfo" class="search-info" style="display:none;"></div>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- script.js loaded at bottom so DOM is ready -->
    <script src="script.js"></script>

</body>
</html>
